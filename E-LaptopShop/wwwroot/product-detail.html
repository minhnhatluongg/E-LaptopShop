<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi tiết sản phẩm</title>
  <style>
    :root {
      --primary: #2563eb; --primary-dark: #1d4ed8;
      --text: #1f2937; --muted: #6b7280;
      --bg: #f9fafb; --card: #ffffff; --border: #e5e7eb;
      --success: #16a34a; --warning: #f59e0b; --danger: #dc2626;
      --gold: #fbbf24;
    }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           margin: 0; background: var(--bg); color: var(--text); line-height: 1.5; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .header { background: var(--card); padding: 16px 24px; border-bottom: 1px solid var(--border);
              display: flex; justify-content: space-between; align-items: center; }
    .header h1 { margin: 0; font-size: 20px; color: var(--primary); }
    .user-info { display: flex; align-items: center; gap: 12px; font-size: 14px; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
           font-size: 14px; font-weight: 500; transition: all .15s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: #fff; color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .product-card { background: var(--card); border-radius: 12px; padding: 24px;
                    box-shadow: 0 1px 3px rgba(0,0,0,.06); display: grid;
                    grid-template-columns: 400px 1fr; gap: 32px; }
    @media (max-width: 800px) { .product-card { grid-template-columns: 1fr; } }
    .gallery .main-image { width: 100%; aspect-ratio: 1; background: #f3f4f6;
                            border-radius: 8px; display: flex; align-items: center;
                            justify-content: center; overflow: hidden; }
    .gallery .main-image img { width: 100%; height: 100%; object-fit: contain; }
    .gallery .thumbs { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .gallery .thumbs img { width: 64px; height: 64px; object-fit: cover; border-radius: 6px;
                            border: 2px solid transparent; cursor: pointer; }
    .gallery .thumbs img.active { border-color: var(--primary); }

    .product-info h2 { margin: 0 0 8px 0; font-size: 24px; }
    .product-info .meta { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
    .product-info .price { font-size: 28px; font-weight: 700; color: var(--danger); margin: 12px 0; }
    .product-info .price .old { text-decoration: line-through; color: var(--muted);
                                  font-size: 16px; font-weight: normal; margin-left: 8px; }
    .product-info .stock { display: inline-block; padding: 4px 10px; border-radius: 4px;
                            font-size: 13px; font-weight: 500; }
    .stock.in { background: #dcfce7; color: var(--success); }
    .stock.out { background: #fee2e2; color: var(--danger); }

    .rating-summary { display: flex; align-items: baseline; gap: 12px; margin: 16px 0; }
    .rating-summary .avg { font-size: 32px; font-weight: 700; color: var(--gold); }
    .rating-summary .stars { color: var(--gold); font-size: 18px; }

    .section { background: var(--card); border-radius: 12px; padding: 24px;
                margin-top: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .section h3 { margin: 0 0 16px 0; font-size: 18px;
                   padding-bottom: 12px; border-bottom: 2px solid var(--border); }

    .specs-table { width: 100%; border-collapse: collapse; }
    .specs-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
    .specs-table td:first-child { font-weight: 500; color: var(--muted); width: 180px; }

    .item { display: flex; gap: 12px; padding: 16px 0; border-bottom: 1px solid var(--border); }
    .item:last-child { border-bottom: none; }
    .item .avatar { width: 40px; height: 40px; border-radius: 50%; background: #ddd;
                     flex-shrink: 0; display: flex; align-items: center; justify-content: center;
                     color: #fff; font-weight: 600; }
    .item .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .item-body { flex: 1; }
    .item-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .item-head strong { font-size: 14px; }
    .item-time { color: var(--muted); font-size: 12px; }
    .item-content { margin: 6px 0; font-size: 14px; }
    .item-actions { margin-top: 6px; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px;
              font-size: 11px; font-weight: 600; }
    .badge-purchased { background: #dcfce7; color: var(--success); }
    .badge-guest { background: #f3f4f6; color: var(--muted); }
    .badge-tier { background: #fef3c7; color: #b45309; }
    .badge-verified { background: #dbeafe; color: var(--primary-dark); }

    .star { color: var(--gold); }
    .star.empty { color: #d1d5db; }

    form.write-box { background: #f9fafb; padding: 16px; border-radius: 8px; margin-bottom: 20px; }
    form.write-box textarea { width: 100%; min-height: 80px; padding: 10px;
                                 border: 1px solid var(--border); border-radius: 6px;
                                 font-family: inherit; font-size: 14px; resize: vertical; }
    .star-input { display: inline-flex; gap: 4px; margin-bottom: 8px; font-size: 24px; cursor: pointer; }
    .star-input span { color: #d1d5db; transition: color .1s; }
    .star-input span.on { color: var(--gold); }

    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .alert-info { background: #dbeafe; color: var(--primary-dark); }
    .alert-warning { background: #fef3c7; color: #b45309; }
    .empty { text-align: center; padding: 40px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="header">
    <h1>E-LaptopShop — Chi tiết sản phẩm</h1>
    <div class="user-info" id="userBar">
      <span id="userBarText">Đang tải...</span>
    </div>
  </div>

  <div class="container">
    <div id="productSection">
      <div class="empty">Đang tải sản phẩm...</div>
    </div>

    <div class="section">
      <h3>Thông số kỹ thuật</h3>
      <div id="specsSection"><div class="empty">—</div></div>
    </div>

    <div class="section">
      <h3 id="reviewsTitle">Đánh giá (0)</h3>
      <div id="reviewWriteBox"></div>
      <div id="reviewsList"><div class="empty">Chưa có đánh giá nào.</div></div>
    </div>

    <div class="section">
      <h3 id="commentsTitle">Bình luận (0)</h3>
      <div id="commentWriteBox"></div>
      <div id="commentsList"><div class="empty">Chưa có bình luận nào.</div></div>
    </div>
  </div>

<script>
const API_BASE = (location.origin && location.origin.startsWith('http')) ? location.origin : 'https://localhost:5001';
const PRODUCT_ID = parseInt(new URLSearchParams(location.search).get('id') || '1', 10);
const TOKEN = localStorage.getItem('accessToken') || '';

let CTX = { isAuthenticated: false, canComment: false, canReview: false };

const $ = (id) => document.getElementById(id);
const esc = (s) => (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const stars = (n) => '★★★★★☆☆☆☆☆'.slice(5 - (n||0), 10 - (n||0));
const fmt = (d) => d ? new Date(d).toLocaleString('vi-VN') : '';
const money = (v) => (v ?? 0).toLocaleString('vi-VN') + ' ₫';

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const res = await fetch(API_BASE + path, { ...opts, headers });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.message || ('HTTP ' + res.status));
  return data;
}

function tierBadge(name) {
  return name ? `<span class="badge badge-tier" title="Danh hiệu thành viên">★ ${esc(name)}</span>` : '';
}
function purchasedBadge(has) {
  return has
    ? '<span class="badge badge-purchased">✓ Đã mua hàng</span>'
    : '<span class="badge badge-guest">Chưa mua</span>';
}
function verifiedBadge(v) {
  return v ? '<span class="badge badge-verified">✓ Mua hàng đã xác minh</span>' : '';
}
function avatar(url, name) {
  if (url) return `<div class="avatar"><img src="${esc(url)}" alt=""/></div>`;
  const ch = (name || '?').trim().charAt(0).toUpperCase();
  return `<div class="avatar">${ch}</div>`;
}

// -------------- LOAD PRODUCT --------------
async function loadProduct() {
  const r = await api(`/api/v1/ProductDetail/${PRODUCT_ID}`);
  const p = r.data;
  const main = (p.images || []).find(i => i.isMain) || (p.images || [])[0];
  const finalPrice = p.discount ? (p.price - (p.price * p.discount / 100)) : p.price;

  $('productSection').innerHTML = `
    <div class="product-card">
      <div class="gallery">
        <div class="main-image">
          ${main ? `<img id="mainImg" src="${esc(main.imageUrl)}" alt="${esc(main.altText || p.name)}"/>`
                 : '<div style="color:#999">Không có ảnh</div>'}
        </div>
        <div class="thumbs">
          ${(p.images || []).map((i, idx) =>
            `<img src="${esc(i.imageUrl)}" data-url="${esc(i.imageUrl)}" class="${idx===0?'active':''}"/>`
          ).join('')}
        </div>
      </div>
      <div class="product-info">
        <div class="meta">${esc(p.brandName || '')} ${p.categoryName ? '• ' + esc(p.categoryName) : ''}</div>
        <h2>${esc(p.name)}</h2>
        <div class="price">
          ${money(finalPrice)}
          ${p.discount ? `<span class="old">${money(p.price)}</span>` : ''}
        </div>
        <div class="rating-summary">
          <span class="avg">${(p.averageRating || 0).toFixed(1)}</span>
          <span class="stars">${stars(Math.round(p.averageRating || 0))}</span>
          <span class="meta">(${p.totalReviews} đánh giá • ${p.totalComments} bình luận)</span>
        </div>
        <div>
          ${(p.inStock || 0) > 0
            ? `<span class="stock in">Còn hàng (${p.inStock})</span>`
            : '<span class="stock out">Hết hàng</span>'}
        </div>
        <p style="margin-top:16px;color:var(--muted)">${esc(p.description || '')}</p>
      </div>
    </div>
  `;
  $('reviewsTitle').textContent = `Đánh giá (${p.totalReviews})`;
  $('commentsTitle').textContent = `Bình luận (${p.totalComments})`;

  document.querySelectorAll('.thumbs img').forEach(img => {
    img.addEventListener('click', () => {
      document.querySelectorAll('.thumbs img').forEach(x => x.classList.remove('active'));
      img.classList.add('active');
      $('mainImg').src = img.dataset.url;
    });
  });

  // Specs
  const s = p.specification;
  if (s) {
    const rows = [
      ['CPU', s.cpu], ['RAM', s.ram], ['Ổ cứng', s.storage], ['GPU', s.gpu],
      ['Màn hình', s.screen], ['Hệ điều hành', s.os], ['Cổng kết nối', s.ports],
      ['Trọng lượng', s.weight], ['Pin', s.battery],
    ].filter(([_, v]) => v);
    $('specsSection').innerHTML = `<table class="specs-table">
      ${rows.map(([k, v]) => `<tr><td>${k}</td><td>${esc(v)}</td></tr>`).join('')}
    </table>`;
  }
}

// -------------- LOAD CONTEXT --------------
async function loadContext() {
  const r = await api(`/api/v1/ProductDetail/${PRODUCT_ID}/context`);
  CTX = r.data;

  if (!CTX.isAuthenticated) {
    $('userBarText').innerHTML = '<span class="badge badge-guest">Chưa đăng nhập</span>';
  } else {
    $('userBarText').innerHTML = `
      ${avatar(CTX.avatarUrl, CTX.fullName)}
      <strong>${esc(CTX.fullName)}</strong>
      ${tierBadge(CTX.loyaltyTierName)}
      ${purchasedBadge(CTX.hasPurchasedThisProduct)}
    `;
  }

  // Comment box
  if (CTX.canComment) {
    $('commentWriteBox').innerHTML = `
      <form class="write-box" onsubmit="return submitComment(event)">
        <textarea id="commentContent" placeholder="Viết bình luận của bạn..." required></textarea>
        <div style="margin-top:8px;text-align:right">
          <button class="btn btn-primary" type="submit">Gửi bình luận</button>
        </div>
      </form>`;
  } else {
    $('commentWriteBox').innerHTML = '<div class="alert alert-info">Vui lòng đăng nhập để bình luận.</div>';
  }

  // Review box
  if (CTX.canReview) {
    $('reviewWriteBox').innerHTML = `
      <form class="write-box" onsubmit="return submitReview(event)">
        <div class="star-input" id="starInput">
          <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span>
          <span data-v="4">★</span><span data-v="5">★</span>
        </div>
        <input type="hidden" id="reviewRating" value="0"/>
        <textarea id="reviewComment" placeholder="Chia sẻ trải nghiệm của bạn về sản phẩm..."></textarea>
        <div style="margin-top:8px;text-align:right">
          <button class="btn btn-primary" type="submit">Gửi đánh giá</button>
        </div>
      </form>`;
    document.querySelectorAll('#starInput span').forEach(s => {
      s.onclick = () => {
        const v = parseInt(s.dataset.v, 10);
        $('reviewRating').value = v;
        document.querySelectorAll('#starInput span').forEach((x, i) => x.classList.toggle('on', i < v));
      };
    });
  } else if (!CTX.isAuthenticated) {
    $('reviewWriteBox').innerHTML = '<div class="alert alert-info">Vui lòng đăng nhập để đánh giá.</div>';
  } else {
    $('reviewWriteBox').innerHTML = '<div class="alert alert-warning">Bạn cần MUA và NHẬN sản phẩm này trước khi đánh giá.</div>';
  }
}

// -------------- LIST RENDER --------------
async function loadComments() {
  const r = await api(`/api/v1/ProductDetail/${PRODUCT_ID}/comments`);
  const list = r.data || [];
  if (list.length === 0) {
    $('commentsList').innerHTML = '<div class="empty">Chưa có bình luận nào.</div>';
    return;
  }
  $('commentsList').innerHTML = list.map(c => `
    <div class="item">
      ${avatar(c.userAvatarUrl, c.userFullName)}
      <div class="item-body">
        <div class="item-head">
          <strong>${esc(c.userFullName || 'Người dùng')}</strong>
          ${tierBadge(c.loyaltyTierName)}
          ${purchasedBadge(c.hasPurchasedThisProduct)}
          <span class="item-time">${fmt(c.createdAt)}</span>
        </div>
        <div class="item-content">${esc(c.content)}</div>
        ${(CTX.userId === c.userId || ['Admin','Manager'].includes(CTX.role))
          ? `<div class="item-actions"><button class="btn btn-sm btn-danger" onclick="deleteComment(${c.id})">Xóa</button></div>`
          : ''}
      </div>
    </div>`).join('');
}

async function loadReviews() {
  const r = await api(`/api/v1/ProductDetail/${PRODUCT_ID}/reviews`);
  const list = r.data || [];
  if (list.length === 0) {
    $('reviewsList').innerHTML = '<div class="empty">Chưa có đánh giá nào.</div>';
    return;
  }
  $('reviewsList').innerHTML = list.map(rv => `
    <div class="item">
      ${avatar(rv.userAvatarUrl, rv.userFullName)}
      <div class="item-body">
        <div class="item-head">
          <strong>${esc(rv.userFullName || 'Người dùng')}</strong>
          ${tierBadge(rv.loyaltyTierName)}
          ${verifiedBadge(rv.isVerifiedPurchase)}
          <span class="item-time">${fmt(rv.createdAt)}</span>
        </div>
        <div style="margin-top:4px">
          ${[1,2,3,4,5].map(i => `<span class="star ${i <= (rv.rating||0) ? '' : 'empty'}">★</span>`).join('')}
        </div>
        <div class="item-content">${esc(rv.comment || '')}</div>
        ${(CTX.userId === rv.userId || ['Admin','Manager'].includes(CTX.role))
          ? `<div class="item-actions"><button class="btn btn-sm btn-danger" onclick="deleteReview(${rv.id})">Xóa</button></div>`
          : ''}
      </div>
    </div>`).join('');
}

// -------------- ACTIONS --------------
async function submitComment(e) {
  e.preventDefault();
  const content = $('commentContent').value.trim();
  if (!content) return false;
  try {
    await api('/api/v1/ProductDetail/comments', { method: 'POST',
      body: JSON.stringify({ productId: PRODUCT_ID, content }) });
    $('commentContent').value = '';
    await loadComments();
  } catch (err) { alert(err.message); }
  return false;
}

async function submitReview(e) {
  e.preventDefault();
  const rating = parseInt($('reviewRating').value, 10);
  if (!rating) { alert('Vui lòng chọn số sao'); return false; }
  const comment = $('reviewComment').value.trim();
  try {
    await api('/api/v1/ProductDetail/reviews', { method: 'POST',
      body: JSON.stringify({ productId: PRODUCT_ID, rating, comment }) });
    $('reviewComment').value = '';
    $('reviewRating').value = 0;
    document.querySelectorAll('#starInput span').forEach(x => x.classList.remove('on'));
    await Promise.all([loadProduct(), loadReviews()]);
  } catch (err) { alert(err.message); }
  return false;
}

async function deleteComment(id) {
  if (!confirm('Xóa bình luận này?')) return;
  try { await api('/api/v1/ProductDetail/comments/' + id, { method: 'DELETE' });
        await loadComments(); }
  catch (err) { alert(err.message); }
}
async function deleteReview(id) {
  if (!confirm('Xóa đánh giá này?')) return;
  try { await api('/api/v1/ProductDetail/reviews/' + id, { method: 'DELETE' });
        await Promise.all([loadProduct(), loadReviews()]); }
  catch (err) { alert(err.message); }
}
window.deleteComment = deleteComment; window.deleteReview = deleteReview;
window.submitComment = submitComment; window.submitReview = submitReview;

// -------------- INIT --------------
(async () => {
  try {
    await loadProduct();
    await loadContext();
    await Promise.all([loadComments(), loadReviews()]);
  } catch (e) {
    $('productSection').innerHTML = `<div class="alert alert-warning">Lỗi: ${esc(e.message)}</div>`;
  }
})();
</script>
</body>
</html>
